name: e10_hs_day_phase2
processed_dir: data/processed/heartsteps
decisions_filename: decisions.parquet
output_dir: artifacts/e10_hs_day_phase2
evaluation_folds: 3
nuisance_folds: 5
ridge_alpha: 1.0
episode_slots: 5
bootstrap_resamples: 2000
bootstrap_confidence: 0.95
bootstrap_seed: 0
model:
  d_model: 64
  n_layers: 2
  n_heads: 4
  dropout: 0.0
training:
  epochs: 40
  batch_size: 128
  learning_rate: 0.001
  weight_decay: 0.01
  grad_clip: 1.0
seeds: [0, 1, 2, 3, 4]
min_positive_seeds: 4
outcome_rmse_tolerance: 0.05
metrics_filename: metrics.json
predictions_filename: predictions.csv
manifest_filename: run_manifest.json
